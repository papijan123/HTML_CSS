<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<style>
.center{
	margin-left:auto;
	margin-right:auto;
}
.table{
	border:1px solid black;
	border-radius:10px;


}
.button{
	border:none;
	color:white;
	background-color:#04AA6D;
	text-align:center;
	cursor:pointer;
	padding: 10px 20px;
	font-size:15px;
	border-radius:10px;
}
.colorT{
	padding:10px 10px;

}

</style>
</head>
<body>
	<div style="text-align:center;">
	<form>
		<h1>Student Registration Form</h1>
	</div>	
		<table width=50% class="center" height=100% >
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="fname">Full Name:</label></div>
			</td>
			<td>
				<div class="colorT"><input type="text" name="fname" placeholder="Enter Full Nmae">
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="email">Email:</label></div>
			</td>
			<td>
				<div class="colorT"><input type="email" name="email" placeholder="Enter Mail">
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="password">Password:</label>
			</td>
			<td>
				<div class="colorT"><input type="password" name="password" placeholder="Enter Password">
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="age">Age:</label>
			</td>
			<td>
				<div class="colorT"><input type="number" name="age">
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="phonenum">Phone number:</label>
			</td>
			<td>
				<div class="colorT"><input type="tel" name="phonenum" placeholder="07XXXXXXXX">
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="dob">Date of birth:</label>
			</td>
			<td>
				<div class="colorT"><input type="date" name="dob">
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="time">Preferred Class time:</label>
			</td>
			<td>
				<div class="colorT"><input type="time" name="time">
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="jonedmonth">Joning month:</label>
			</td>
			<td>
				<div class="colorT"><input type="month" name="jonedmonth">
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="preferredweeek">Preferred Week:</label>
			</td>
			<td>
				<div class="colorT"><input type="week" name="jonedmonth">
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="web">Profololio Website:</label>
			</td>
			<td>
				<div class="colorT"><input type="url" name="web" placeholder="https://example.com">
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="course">Search Course</label>
			</td>
			<td>
				<div class="colorT"><input type="search" name="course" placeholder="Search Course">
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="color">Favourite Color:</label>
			</td>
			<td>
				<div class="colorT"><input type="color" name="color">
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="range">Skill Level:</label>
			</td>
			<td>
				<div class="colorT"><input type="range" name="range">
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="gender">Gender:</label>
			</td>
			<td>
				<div class="colorT"><input type="radio" name="gender">Male<input type="radio" name="gender">female<input type="radio" name="gender">other
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="sub">Subject:</label>
			</td>
			<td>
				<div class="colorT"><input type="checkbox" name="sub">HTML<input type="checkbox" name="sub">CSS<input type="checkbox" name="sub">JavaScript
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="scourse">Course:</label>
			</td>
			<td>
				<div class="colorT"><select>
					<option>Select Course</option>
					<option>Python for Data Science</option>
					<option>Mobile App Development(React Native)</option>
					<option>Mobile App Development(Flutter+Dart)</option>
				
				</select>
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="lang">Languages:</label>
			</td>
			<td>
				<div class="colorT"><textarea>
				                     </textarea>
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="city">City:</label>
			</td>
			<td>
				<div class="colorT"><input type="text" name="city">
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;">
			<td>
				<div class="colorT"><label for="address">Address:</label>
			</td>
			<td>
				<div class="colorT"><textarea>
				</textarea>
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="photo">Upload photo:</label>
			</td>
			<td>
				<div class="colorT"><input type="file" name="photo">
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<div class="colorT"><label for="id">Studen Id:</label>
			</td>
			<td>
				<div class="colorT"><input type="text" name="id">
			</td>
		</tr>
		<tr height=50px>
			<td>
				<div class="colorT"><label for="code">Referral code:</label>
			</td>
			<td>
				<div class="colorT"><input type="text" name="code" placeholder="Referral" disabled>
			</td>
		</tr>
		<tr style="background-color:#FBE8CE;" height=50px>
			<td>
				<input type="submit" class="button">
					<input type="reset" class="button">
			</td>
			<td></td>
		</tr>
	</table>
	
</body>
</html>
