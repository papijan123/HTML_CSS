<html>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<style>
.center{
	margin-left:auto;
	margin-right:auto;
}

.button{
	border:none;
	color:white;
	background-color:#04AA6D;
	text-align:center;
	cursor:pointer;
	padding: 10px 20px;
	font-size:15px;
	border-radius:10px;
}
.colorT{
	padding:30px 100px;

}

.element3 {
  transition: all 0.3s ease-out;
	margin-left:250px;
	margin-right:250px;
	border-radius:10px;
	background-color: #f2f2f2;
    
}

.element3:hover {
	transform: scale(1.01) rotate(0deg) translate(0px, 0px) skewX(0deg);
	box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
}

.div{
	margin-left:250px;
	margin-right:250px;
	border-radius:10px;
    box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);

}
.ani {
  width: 100%;
  height: 100%;
  position: relative;
  animation: mymove 2s ;
}

@keyframes mymove {
  from {top: 200px;}
  to {top: 0px;}
  from{opacity: 0;}
  to{opacity: 1;}
}

</style>
</head>
