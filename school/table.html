}
table{
	border:1px solid black;

}
tr,td,th{

.ani {
  width: 100%;
  height: 100%;
  position: relative;
  animation: mymove 2s ;
}

@keyframes mymove {

  to {top: 0px;}
  from{opacity: 0;}
  to{opacity: 1;}
}
