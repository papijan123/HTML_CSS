			ul li a .icon {

			  color: #262626;
			  transition: .5s;
			  z-index: 3;
			}

			ul li a:hover .icon {
			  color: #fff;

			}

			ul li a:before {
			  content: "";
			  position: absolute;
			  top: 100%;
			  left: 0;
			  width: 100%;
			  height: 100%;
			  background: #f00;
			  transition: .5s;
			  z-index: 2;
			}

			ul li a:hover:before {
			  top: 0;
			}

			ul li:nth-child(1) a:before{

			}

			ul li:nth-child(2) a:before{
